# CI pipeline — runs on every push and pull request
# Enforces: format → lint → type-check → tests
# A PR cannot be merged unless all jobs pass (enforce via branch protection rules)

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]" || uv pip install --group dev -e .

      - name: Format check (ruff)
        run: source .venv/bin/activate && ruff format --check .

      - name: Lint (ruff)
        run: source .venv/bin/activate && ruff check .

      - name: Type check (mypy)
        run: source .venv/bin/activate && mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality    # only run tests if lint/type-check passes

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # test across supported versions

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]" || uv pip install --group dev -e .

      - name: Run tests
        run: source .venv/bin/activate && pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: .coverage
